<svg width="56" height="68" viewBox="0 0 56 68" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Plastic stick gradients -->
    <linearGradient id="plasticStick" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="50%" style="stop-color:#d0d0d0"/>
      <stop offset="100%" style="stop-color:#c8c8c8"/>
    </linearGradient>
    
    <!-- Cotton head white -->
    <radialGradient id="cottonHead" cx="35%" cy="25%">
      <stop offset="0%" style="stop-color:#fafafa"/>
      <stop offset="70%" style="stop-color:#f5f5f5"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </radialGradient>
    
    <!-- PVP/Iodine stain gradient -->
    <radialGradient id="pvpStain" cx="60%" cy="60%">
      <stop offset="0%" style="stop-color:#b8860b"/>
      <stop offset="50%" style="stop-color:#8b6914"/>
      <stop offset="100%" style="stop-color:#6b5210"/>
    </radialGradient>
    
    <!-- Glossy shine -->
    <linearGradient id="glossShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Main plastic stick - slightly angled -->
  <g transform="translate(28, 15) rotate(-15)">
    <rect x="-3" y="0" width="6" height="48" fill="url(#plasticStick)" rx="3"/>
    <rect x="-2.5" y="2" width="1.5" height="44" fill="rgba(255,255,255,0.3)" rx="1"/>
    <line x1="-3" y1="0" x2="-3" y2="48" stroke="rgba(0,0,0,0.05)" stroke-width="0.5"/>
  </g>
  
  <!-- Cotton swab head - positioned at top -->
  <g transform="translate(28, 6)">
    <!-- Main cotton ball shape -->
    <ellipse cx="0" cy="0" rx="13" ry="15" fill="url(#cottonHead)"/>
    
    <!-- Left side - pristine white cotton -->
    <circle cx="-7" cy="-8" r="6.5" fill="rgba(255,255,255,0.8)"/>
    <circle cx="-9" cy="-2" r="5.5" fill="rgba(255,255,255,0.75)"/>
    <circle cx="-8" cy="6" r="5" fill="rgba(248,248,248,0.7)"/>
    
    <!-- Right side - PVP stained cotton -->
    <circle cx="7" cy="-8" r="6.5" fill="url(#pvpStain)"/>
    <circle cx="9" cy="-2" r="5.5" fill="url(#pvpStain)"/>
    <circle cx="8" cy="6" r="5" fill="url(#pvpStain)"/>
    
    <!-- Center transition area -->
    <ellipse cx="2" cy="0" rx="5" ry="12" fill="url(#pvpStain)" opacity="0.6"/>
    
    <!-- Main PVP overlay -->
    <ellipse cx="4" cy="1" rx="8" ry="13" fill="url(#pvpStain)" opacity="0.55"/>
    
    <!-- Glossy shine on white side -->
    <ellipse cx="-6" cy="-6" rx="4" ry="6" fill="rgba(255,255,255,0.5)"/>
    
    <!-- Subtle shadow underneath -->
    <ellipse cx="0" cy="16" rx="12" ry="2" fill="rgba(0,0,0,0.1)"/>
  </g>
  
  <!-- Targeting crosshair at the tip -->
  <g transform="translate(28, 62)" opacity="0.5">
    <circle cx="0" cy="0" r="1.2" fill="#0066cc"/>
    <circle cx="0" cy="0" r="2.2" fill="none" stroke="#00bcd4" stroke-width="0.4"/>
  </g>
</svg>